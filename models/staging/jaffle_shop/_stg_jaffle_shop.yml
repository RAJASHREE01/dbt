sources:
  - name: jaffle_shop
    database: shop
    schema: public

    tables:
      - name: payments
      - name: orders
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: status
            tests:
            - accepted_values:
                values: ['completed','placed','returned','return_pending','shipped']
      - name: customers
        columns:
          - name: id
            tests:
              - unique
              - not_null

models:
  - name: stg_jaffle_shop__customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
      - name: last_name