sources:
  - name: jaffle_shop
    database: shop
    schema: public

    tables:
      - name: payments
      - name: orders
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: status
            description: "{{ doc('order_status')}}"
            tests:
              - accepted_values:
                  arguments:
                    values: ['completed','placed','returned','return_pending','shipped']
      - name: customers
        columns:
          - name: id
            tests:
              - unique
              - not_null

models:
  - name: stg_jaffle_shop__customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['completed','shipped','returned','placed','return_pending']
      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
